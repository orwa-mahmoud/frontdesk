services:
  postgres:
    image: pgvector/pgvector:pg17
    env_file: .env.docker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env.docker
    ports:
      - "8000:8000"
    # Raw uploads are streamed here and read back by the worker — both mount the
    # same volume so the file the web wrote is the file the worker ingests.
    volumes:
      - uploads:/app/var/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Arq worker: runs document ingestion (parse/chunk/embed) off the web request and
  # re-enqueues stuck documents, so ingestion survives restarts. Starts after the
  # backend is healthy (migrations applied), so its own entrypoint upgrade is a no-op.
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env.docker
    command: ["uv", "run", "--no-sync", "arq", "src.drivers.jobs.worker.WorkerSettings"]
    volumes:
      - uploads:/app/var/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
